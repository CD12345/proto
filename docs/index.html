<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #aaa;
            font-size: 0.9em;
        }

        .song-selector {
            margin-bottom: 30px;
        }

        .song-selector label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #fff;
        }

        .song-selector select {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .song-selector select:focus {
            outline: none;
            border-color: #f5576c;
        }

        .song-selector option {
            background: #1a1a2e;
            color: #fff;
        }

        .code-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .code-display pre {
            color: #a8ff60;
            font-size: 0.95em;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-play {
            background: linear-gradient(45deg, #56ab2f 0%, #a8e063 100%);
            color: #1a1a2e;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 224, 99, 0.4);
        }

        .btn-stop {
            background: linear-gradient(45deg, #eb3349 0%, #f45c43 100%);
            color: #fff;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 92, 67, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #666;
        }

        .status-indicator.playing {
            background: #a8e063;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info {
            text-align: center;
            color: #aaa;
            font-size: 0.85em;
            margin-top: 20px;
        }

        .error {
            background: rgba(235, 51, 73, 0.2);
            border: 1px solid #eb3349;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Strudel Player</h1>
        <p class="subtitle">Live Coding Music Environment</p>

        <div class="song-selector">
            <label for="songSelect">Select a Song:</label>
            <select id="songSelect">
                <option value="">-- Choose a composition --</option>
            </select>
        </div>

        <div class="code-display">
            <pre id="codeDisplay">// Select a song to see the code...</pre>
        </div>

        <div class="status">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">Ready</span>
        </div>

        <div class="controls">
            <button class="btn btn-play" id="playBtn">▶ Play</button>
            <button class="btn btn-stop" id="stopBtn">■ Stop</button>
        </div>

        <div class="error" id="errorDisplay"></div>

        <div class="info">
            Powered by <a href="https://strudel.cc" target="_blank" style="color: #f5576c;">Strudel</a>
        </div>
    </div>

    <script type="module">
        import { repl } from 'https://cdn.jsdelivr.net/npm/@strudel/repl@latest/index.mjs';

        let currentRepl = null;
        let currentPattern = null;

        // Embedded songs
        const songs = {
            'techno-beat': {
                name: 'Techno Beat',
                code: `// Techno Beat - Driving electronic rhythm
stack(
  sound("bd*4")
    .gain(0.8),
  sound("~ hh*2")
    .gain(0.5),
  sound("[~ sd]*2")
    .gain(0.6),
  sound("~ ~ ~ cp")
    .gain(0.7)
    .delay(0.3)
    .delaytime(0.125)
    .delayfeedback(0.4)
).cpm(128)`
            },
            'ambient-waves': {
                name: 'Ambient Waves',
                code: `// Ambient Waves - Ethereal soundscape
stack(
  note("<c2 g2 f2 e2>")
    .s("sawtooth")
    .lpf(800)
    .gain(0.4)
    .room(0.9)
    .delay(0.5),
  note("<e3 g3 d3 c3>")
    .s("triangle")
    .lpf(1200)
    .gain(0.3)
    .slow(2),
  note("c4 e4 g4 a4")
    .s("sine")
    .gain(0.25)
    .delay(0.7)
    .delaytime(0.375)
    .slow(4)
).cpm(60)`
            },
            'jazz-improv': {
                name: 'Jazz Improv',
                code: `// Jazz Improv - Swing rhythms and walking bass
stack(
  note("<c3 eb3 g3 bb3>")
    .s("sawtooth")
    .lpf(600)
    .gain(0.5)
    .room(0.3),
  note("c5 d5 e5 g5 a5 g5 e5 d5")
    .s("triangle")
    .gain(0.4)
    .delay(0.2)
    .fast(2),
  sound("jazz:0*4")
    .gain(0.6)
    .speed("<1 0.9 1.1 0.95>"),
  sound("[~ hh]*4")
    .gain(0.3)
).cpm(120)`
            },
            'percussion-groove': {
                name: 'Percussion Groove',
                code: `// Percussion Groove - Polyrhythmic drums
stack(
  sound("bd*4")
    .gain(0.9),
  sound("~ sd ~ sd")
    .gain(0.7),
  sound("hh*8")
    .gain(0.4),
  sound("~ ~ cp ~")
    .gain(0.6),
  sound("[~ ~ ~]*3 tabla:2")
    .gain(0.5)
    .speed(rand.range(0.9, 1.1)),
  sound("~ [~ shaker]*2 ~")
    .gain(0.35)
).cpm(110)`
            },
            'melodic-patterns': {
                name: 'Melodic Patterns',
                code: `// Melodic Patterns - Arpeggiated sequences
stack(
  note("c4 e4 g4 b4 c5 b4 g4 e4")
    .s("square")
    .lpf(sine.range(400, 2000).slow(8))
    .gain(0.4)
    .delay(0.4)
    .delaytime(0.25),
  note("<c2 a1 f2 g2>")
    .s("sawtooth")
    .lpf(300)
    .gain(0.5),
  sound("bd ~ ~ ~")
    .gain(0.7),
  sound("~ ~ hh ~")
    .gain(0.4)
).cpm(140)`
            }
        };

        const elements = {
            songSelect: document.getElementById('songSelect'),
            codeDisplay: document.getElementById('codeDisplay'),
            playBtn: document.getElementById('playBtn'),
            stopBtn: document.getElementById('stopBtn'),
            statusIndicator: document.getElementById('statusIndicator'),
            statusText: document.getElementById('statusText'),
            errorDisplay: document.getElementById('errorDisplay')
        };

        function loadSongs() {
            for (const [key, song] of Object.entries(songs)) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = song.name;
                elements.songSelect.appendChild(option);
            }
        }

        async function initStrudel() {
            try {
                currentRepl = await repl({
                    defaultOutput: 'webaudio',
                    prebake: true
                });
                updateStatus('Ready', false);
            } catch (error) {
                showError('Failed to initialize Strudel: ' + error.message);
            }
        }

        function updateStatus(text, isPlaying) {
            elements.statusText.textContent = text;
            if (isPlaying) {
                elements.statusIndicator.classList.add('playing');
            } else {
                elements.statusIndicator.classList.remove('playing');
            }
        }

        function showError(message) {
            elements.errorDisplay.textContent = '⚠ ' + message;
            elements.errorDisplay.classList.add('show');
            setTimeout(() => {
                elements.errorDisplay.classList.remove('show');
            }, 5000);
        }

        elements.songSelect.addEventListener('change', (e) => {
            const songKey = e.target.value;
            if (songKey && songs[songKey]) {
                elements.codeDisplay.textContent = songs[songKey].code;
                if (currentPattern) {
                    stop();
                }
            } else {
                elements.codeDisplay.textContent = '// Select a song to see the code...';
            }
        });

        elements.playBtn.addEventListener('click', async () => {
            const songKey = elements.songSelect.value;
            if (!songKey) {
                showError('Please select a song first');
                return;
            }

            try {
                elements.playBtn.disabled = true;

                if (!currentRepl) {
                    await initStrudel();
                }

                const code = songs[songKey].code;
                currentPattern = await currentRepl.evaluate(code);

                updateStatus(`Playing: ${songs[songKey].name}`, true);
                elements.stopBtn.disabled = false;
            } catch (error) {
                showError('Playback error: ' + error.message);
                updateStatus('Error', false);
            } finally {
                elements.playBtn.disabled = false;
            }
        });

        elements.stopBtn.addEventListener('click', () => {
            stop();
        });

        function stop() {
            if (currentPattern) {
                currentPattern.stop();
                currentPattern = null;
                updateStatus('Stopped', false);
                elements.stopBtn.disabled = true;
            }
        }

        // Initialize
        loadSongs();
        initStrudel();
    </script>
</body>
</html>
